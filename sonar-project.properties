# Project identification
sonar.projectKey=YOUR_ORG_YOUR_PROJECT_KEY
sonar.organization=YOUR_ORG_KEY

# Source & test locations
sonar.sources=lib
sonar.tests=test

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage report (LCOV format from flutter test --coverage)
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/generated/**
sonar.test.exclusions=test/**
