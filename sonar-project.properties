# ── SonarCloud Identity ─────────────────────────────────
sonar.organization=agrichain-mobile-app
sonar.projectKey=daniyalakhtar67_AgriChain

# ── Source Configuration ─────────────────────────────────
sonar.sources=lib,pubspec.yaml
sonar.tests=test
sonar.sourceEncoding=UTF-8

# ── Coverage Report Path ─────────────────────────────────
sonar.dart.lcov.reportPaths=coverage/lcov.info

# ── Exclusions (skip generated code) ─────────────────────
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.mocks.dart,build/**,.dart_tool/**

# ── Coverage Exclusions ──────────────────────────────────
sonar.coverage.exclusions=**/*_test.dart,lib/main.dart
